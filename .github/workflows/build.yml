name: Build Commits

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'website/**'
      - '.github/readme_assets/**'

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Set GitHub Environment Variables
        run: |
          GITHUB_SHA_SHORT="$(git rev-parse --short HEAD)"
          echo "GITHUB_SHA_SHORT=$GITHUB_SHA_SHORT" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=BlueMapGUI_${GITHUB_SHA_SHORT}_Linux_x64" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Configure Flutter
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build
        run: flutter build linux --release --dart-define=version=$GITHUB_SHA_SHORT

      - name: Prepare for upload
        run: |
          mv ./build/linux/x64/release/bundle/ "./$ARTIFACT_NAME/"
          zip -9 -r "./$ARTIFACT_NAME.zip" "./$ARTIFACT_NAME/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: "./${{ env.ARTIFACT_NAME }}.zip"
          archive: false

      - name: Prepare for AppImage
        run: |
          mv "./$ARTIFACT_NAME/" ./AppDir
          cp ./linux/com.technicjelle.bluemap_gui.desktop ./AppDir
          cp ./linux/AppRun ./AppDir
          cd AppDir
          chmod +x ./AppRun
          ln -s ./data/flutter_assets/assets/icon_256.png ./com.technicjelle.bluemap_gui.png
          ln -s ./com.technicjelle.bluemap_gui.png ./.DirIcon

      - name: Download AppImage Tool
        run: |
          wget https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Generate AppImage
        run: ./appimagetool-x86_64.AppImage AppDir "$ARTIFACT_NAME.AppImage" --no-appstream

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          path: "BlueMapGUI*.AppImage"
          archive: false

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set GitHub Environment Variables
        run: |
          $GITHUB_SHA_SHORT = git rev-parse --short HEAD
          Add-Content -Path $env:GITHUB_ENV -Value "GITHUB_SHA_SHORT=$GITHUB_SHA_SHORT"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT_NAME=BlueMapGUI_${GITHUB_SHA_SHORT}_Windows_x64"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Configure Flutter
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build
        run: flutter build windows --release --dart-define=version=$env:GITHUB_SHA_SHORT

      - name: Prepare for upload
        run: |
          Move-Item -Path "./build/windows/x64/runner/Release/" -Destination "./$env:ARTIFACT_NAME/"
          Compress-Archive -Path "./$env:ARTIFACT_NAME" -DestinationPath "./$env:ARTIFACT_NAME.zip" -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: "${{ env.ARTIFACT_NAME }}.zip"
          archive: false
